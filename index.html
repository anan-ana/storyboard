<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>作文分鏡教學系統 - 專業版</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/clshortridge/aframe-drag-controls@master/dist/aframe-drag-controls.min.js"></script>
    
    <style>
        body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
        #control-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            width: 260px; background: rgba(255, 255, 255, 0.95);
            padding: 20px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            max-height: 90vh; overflow-y: auto;
        }
        .group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #333; }
        select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #4361ee; color: white; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { background: #3731d2; transform: translateY(-1px); }
        .del-btn { background: #ef476f; }
        .del-btn:hover { background: #d63d60; }
        .hint { font-size: 12px; color: #666; line-height: 1.5; margin-top: 10px; }
        #status { font-size: 12px; color: #4361ee; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

    <div id="control-panel">
        <div class="group">
            <label>1. 選擇場景背景</label>
            <select id="env-select" onchange="changeEnv(this.value)">
                <option value="forest">寂靜森林</option>
                <option value="contact">現代室內</option>
                <option value="egypt">荒漠遺跡</option>
                <option value="dream">夢幻空間</option>
            </select>
        </div>

        <div class="group">
            <label>2. 新增分鏡物件</label>
            <div id="status">目前未選取</div>
            <select id="item-select">
                <optgroup label="人偶角色">
                    <option value="actor-main">主角 (藍色)</option>
                    <option value="actor-sub">配角 (橘色)</option>
                </optgroup>
                <optgroup label="家具物品">
                    <option value="chair">椅子</option>
                    <option value="desk">桌子</option>
                </optgroup>
            </select>
            <button onclick="spawn()">＋ 放入場景</button>
        </div>

        <div class="group">
            <label>3. 操作選中物件</label>
            <button onclick="rotateObj()">↺ 旋轉角度 (45°)</button>
            <button class="del-btn" onclick="deleteObj()">🗑 移除物件</button>
        </div>

        <div class="group">
            <label>4. 預覽分鏡</label>
            <button onclick="toggleCam('work')">佈置視角 (俯瞰)</button>
            <button onclick="toggleCam('shot')">特寫視角 (水平)</button>
        </div>
        <div class="hint">
            <strong>操作說明：</strong><br>
            • 滑鼠左鍵：選取並拖曳移動<br>
            • 滑鼠右鍵：旋轉視野<br>
            • WASD 鍵：移動相機位置
        </div>
    </div>

    <a-scene embedded drag-controls="objects: .draggable" cursor="rayOrigin: mouse" raycaster="objects: .draggable">
        
        <a-entity id="env" environment="preset: forest; dressingAmount: 20"></a-entity>
        
        <a-grid position="0 0.01 0" rotation="0 0 0" width="20" height="20" static-body src="https://cdn.aframe.io/a-grid/images/grid.png"></a-grid>
        <a-entity id="grid-visual" geometry="primitive: plane; width: 20; height: 20" rotation="-90 0 0" 
                  material="src: https://cdn.rawgit.com/donmccurdy/aframe-extras/master/assets/grid.png; repeat: 20 20; transparent: true; opacity: 0.5"></a-entity>

        <a-entity id="stage"></a-entity>

        <a-entity id="rig">
            <a-entity id="workCam" camera look-controls wasd-controls position="0 5 8" rotation="-30 0 0" active="true"></a-entity>
            <a-entity id="shotCam" camera look-controls position="0 1.5 0" active="false"></a-entity>
        </a-entity>

        <a-entity light="type: ambient; intensity: 0.7"></a-entity>
        <a-entity light="type: directional; castShadow: true; intensity: 0.5" position="-1 5 2"></a-entity>
    </a-scene>

    <script>
        let selectedEl = null;
        const statusText = document.getElementById('status');

        function spawn() {
            const val = document.getElementById('item-select').value;
            const stage = document.getElementById('stage');
            const el = document.createElement('a-entity');
            
            // 設定初始位置與可拖拽屬性
            el.setAttribute('class', 'draggable');
            el.setAttribute('position', {x: (Math.random()-0.5)*2, y: 0, z: -2});
            
            if(val.includes('actor')) {
                // 建立人偶組合
                el.setAttribute('geometry', 'primitive: capsule; radius: 0.3; height: 1.5');
                el.setAttribute('material', 'color', val === 'actor-main' ? '#4361ee' : '#f72585');
                el.setAttribute('position', {x: (Math.random()-0.5)*2, y: 0.75, z: -2});
            } else if(val === 'chair') {
                el.setAttribute('geometry', 'primitive: box; width: 0.6; height: 0.8; depth: 0.6');
                el.setAttribute('material', 'color', '#7209b7');
                el.setAttribute('position', {x: (Math.random()-0.5)*2, y: 0.4, z: -2});
            } else {
                el.setAttribute('geometry', 'primitive: box; width: 1.2; height: 0.7; depth: 0.8');
                el.setAttribute('material', 'color', '#4cc9f0');
                el.setAttribute('position', {x: (Math.random()-0.5)*2, y: 0.35, z: -2});
            }

            // 選取事件偵聽
            el.addEventListener('mousedown', function() {
                if(selectedEl) selectedEl.setAttribute('material', 'emissive', '#000');
                selectedEl = el;
                selectedEl.setAttribute('material', 'emissive', '#333');
                statusText.innerText = "已選中：" + (val === 'actor-main' ? "主角" : val === 'actor-sub' ? "配角" : "家具");
            });

            stage.appendChild(el);
        }

        function rotateObj() {
            if(!selectedEl) return alert("請先點選場景中的物件！");
            let rot = selectedEl.getAttribute('rotation');
            selectedEl.setAttribute('rotation', {x: rot.x, y: rot.y + 45, z: rot.z});
        }

        function deleteObj() {
            if(selectedEl) {
                selectedEl.parentNode.removeChild(selectedEl);
                selectedEl = null;
                statusText.innerText = "目前未選取";
            }
        }

        function changeEnv(p) {
            document.getElementById('env').setAttribute('environment', 'preset', p);
        }

        function toggleCam(mode) {
            const work = document.getElementById('workCam');
            const shot = document.getElementById('shotCam');
            work.setAttribute('camera', 'active', mode === 'work');
            shot.setAttribute('camera', 'active', mode === 'shot');
        }
    </script>
</body>
</html>
