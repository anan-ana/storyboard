<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>作文分鏡教學系統 - 穩定版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.0/aframe.min.js"></script>
    <style>
        body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
        #ui {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            width: 220px; background: rgba(255, 255, 255, 0.95);
            padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        label { display: block; font-size: 14px; font-weight: bold; margin: 10px 0 5px; }
        select, button { width: 100%; padding: 8px; margin: 4px 0; border-radius: 6px; border: 1px solid #ccc; font-size: 13px; }
        button { background: #4361ee; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #3731d2; }
        .del { background: #ef476f; }
        .status { font-size: 12px; color: #4361ee; margin-bottom: 5px; min-height: 1.2em; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="status" id="stat">請選取場景中的物件</div>
        
        <label>1. 放入物件</label>
        <select id="item">
            <option value="actor1">主角 (藍色)</option>
            <option value="actor2">配角 (橘色)</option>
            <option value="chair">椅子</option>
        </select>
        <button onclick="spawn()">＋ 新增到中央</button>

        <label>2. 調整與旋轉</label>
        <button onclick="rotate()">↺ 旋轉角度</button>
        <button class="del" onclick="remove()">🗑 移除選中物</button>

        <label>3. 視角切換</label>
        <button onclick="cam('work')">佈置視角</button>
        <button onclick="cam('shot')">分鏡視角</button>
    </div>

    <a-scene embedded cursor="rayOrigin: mouse">
        <a-sky color="#808080"></a-sky>

        <a-entity position="0 0 0" rotation="-90 0 0" 
                  geometry="primitive: plane; width: 20; height: 20" 
                  material="wireframe: true; color: #444; opacity: 0.5"></a-entity>

        <a-entity id="stage"></a-entity>

        <a-entity id="rig" position="0 0 0">
            <a-entity id="workCam" camera look-controls wasd-controls position="0 4 6" rotation="-35 0 0" active="true"></a-entity>
            <a-entity id="shotCam" camera look-controls position="0 1.5 2" active="false"></a-entity>
        </a-entity>

        <a-entity light="type: ambient; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; intensity: 0.5" position="1 3 2"></a-entity>
    </a-scene>

    <script>
        let selected = null;
        const stat = document.getElementById('stat');

        function spawn() {
            const val = document.getElementById('item').value;
            const stage = document.getElementById('stage');
            const el = document.createElement('a-entity');
            
            // 重要：讓物件可以被滑鼠偵測到
            el.setAttribute('class', 'draggable');
            
            if(val.startsWith('actor')) {
                el.setAttribute('geometry', 'primitive: cylinder; radius: 0.3; height: 1.5');
                el.setAttribute('material', 'color', val === 'actor1' ? '#4361ee' : '#fb8500');
                el.setAttribute('position', '0 0.75 -3');
            } else {
                el.setAttribute('geometry', 'primitive: box; width: 0.6; height: 0.8; depth: 0.6');
                el.setAttribute('material', 'color', '#666');
                el.setAttribute('position', '0 0.4 -3');
            }

            // 原生拖拽模擬與選取
            el.addEventListener('mousedown', function() {
                if(selected) selected.setAttribute('material', 'emissive', '#000');
                selected = el;
                selected.setAttribute('material', 'emissive', '#333');
                stat.innerText = "已選中該物件，可旋轉或刪除";
            });

            stage.appendChild(el);
            stat.innerText = "已新增物件至畫面中央";
        }

        function rotate() {
            if(!selected) return alert("請先選取場景內的物件！");
            let rot = selected.getAttribute('rotation');
            selected.setAttribute('rotation', `0 ${rot.y + 45} 0`);
        }

        function remove() {
            if(selected) {
                selected.parentNode.removeChild(selected);
                selected = null;
                stat.innerText = "物件已移除";
            }
        }

        function cam(m) {
            const work = document.getElementById('workCam');
            const shot = document.getElementById('shotCam');
            work.setAttribute('camera', 'active', m === 'work');
            shot.setAttribute('camera', 'active', m === 'shot');
        }
    </script>
</body>
</html>
