<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>3D 模型分鏡教學系統</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
        #ui {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            width: 240px; background: rgba(255, 255, 255, 0.95);
            padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h3 { margin-top: 0; font-size: 18px; color: #4361ee; border-bottom: 2px solid #4361ee; }
        label { display: block; font-size: 13px; font-weight: bold; margin: 10px 0 5px; }
        select, button { width: 100%; padding: 10px; margin-bottom: 5px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #4361ee; color: white; border: none; cursor: pointer; font-weight: bold; }
        .del { background: #ef476f; }
        .status { font-size: 11px; color: #666; margin-bottom: 10px; background: #eee; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>🎬 3D 分鏡實作</h3>
        <div class="status" id="stat">請選擇模型並放入場景</div>
        
        <label>1. 選擇 3D 物件</label>
        <select id="item-select">
            <option value="actor">小人偶 (作文主角)</option>
            <option value="helmet">探險頭盔 (科幻物件)</option>
            <option value="dino">三角龍 (冒險場景)</option>
        </select>
        <button onclick="spawn()">＋ 放入場景中央</button>

        <label>2. 修改選中物</label>
        <button onclick="rotate()">↺ 旋轉角度 (45°)</button>
        <button class="del" onclick="remove()">🗑 移除選中物</button>

        <div style="font-size: 11px; color: #999; margin-top: 10px;">
            提示：滑鼠右鍵旋轉視角<br>滾輪縮放 / WASD 移動
        </div>
    </div>

    <a-scene embedded cursor="rayOrigin: mouse">
        <a-assets>
            <a-asset-item id="model-actor" src="https://cdn.aframe.io/test-models/models/glTF-2.0/virtualcity/VC.gltf"></a-asset-item>
            <a-asset-item id="model-helmet" src="https://cdn.aframe.io/test-models/models/flight-helmet/FlightHelmet.gltf"></a-asset-item>
            <a-asset-item id="model-dino" src="https://cdn.aframe.io/examples/ar/models/triceratops/scene.gltf"></a-asset-item>
        </a-assets>

        <a-sky color="#666"></a-sky>
        
        <a-entity position="0 0 0" rotation="-90 0 0" 
                  geometry="primitive: plane; width: 20; height: 20" 
                  material="color: #444; wireframe: true; opacity: 0.5"></a-entity>
        <a-plane position="0 -0.01 0" rotation="-90 0 0" width="20" height="20" color="#333"></a-plane>

        <a-entity id="stage"></a-entity>

        <a-entity id="rig" position="0 0 0">
            <a-entity camera look-controls wasd-controls position="0 3 5" rotation="-20 0 0"></a-entity>
        </a-entity>

        <a-entity light="type: ambient; intensity: 1"></a-entity>
        <a-entity light="type: directional; intensity: 0.8" position="1 4 3"></a-entity>
    </a-scene>

    <script>
        let selected = null;
        const stat = document.getElementById('stat');

        function spawn() {
            const type = document.getElementById('item-select').value;
            const stage = document.getElementById('stage');
            const el = document.createElement('a-entity');
            
            // 根據選單載入不同模型
            el.setAttribute('gltf-model', `#model-${type}`);
            
            // 初始設定 (位置、大小調整)
            el.setAttribute('position', '0 0 -3');
            if(type === 'dino') el.setAttribute('scale', '0.01 0.01 0.01'); // 恐龍原始模型超大，需要縮小
            else if(type === 'actor') el.setAttribute('scale', '1 1 1');
            else el.setAttribute('scale', '2 2 2');

            // 選取邏輯
            el.addEventListener('mousedown', function() {
                if(selected) {
                    selected.setAttribute('material', 'emissive', '#000');
                }
                selected = el;
                // 讓選中的東西發一點光
                stat.innerText = "已選中該模型";
            });

            stage.appendChild(el);
            stat.innerText = "模型已生成！";
        }

        function rotate() {
            if(!selected) return alert("請先選取場景中的模型");
            let rot = selected.getAttribute('rotation');
            selected.setAttribute('rotation', `0 ${rot.y + 45} 0`);
        }

        function remove() {
            if(selected) {
                selected.parentNode.removeChild(selected);
                selected = null;
                stat.innerText = "已移除物件";
            }
        }
    </script>
</body>
</html>
